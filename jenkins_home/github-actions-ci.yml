name: GitHub Actions CI (Backup)

# Triggers: push to main/develop, any pull request
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:           # Allow manual trigger from GitHub UI
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [qa, dev, staging]
      browser:
        description: 'Browser for tests'
        required: true
        default: 'chrome'
        type: choice
        options: [chrome, firefox]

jobs:

  # ── Job 1: Build and Test ──────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Print environment info
        run: |
          echo "Java version:"
          java -version
          echo "Maven version:"
          mvn -version
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor : ${{ github.actor }}"

      - name: Compile source code
        working-directory: app
        run: mvn clean compile -q --no-transfer-progress

      - name: Run unit tests (TestNG)
        working-directory: app
        run: |
          mvn test \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true \
            --no-transfer-progress

      - name: Upload TestNG report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testng-report-${{ github.run_number }}
          path: app/test-output/
          retention-days: 14

      - name: Package JAR
        working-directory: app
        run: mvn package -DskipTests -q --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar-${{ github.run_number }}
          path: app/target/*.jar
          retention-days: 30

  # ── Job 2: Code Quality Check ─────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: app
        run: |
          mvn checkstyle:check --no-transfer-progress 2>/dev/null \
          || echo "Checkstyle not configured — skipping"

  # ── Job 3: Notify on failure ───────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed on branch ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor : ${{ github.actor }}"
          # Add Slack/email webhook call here if needed
